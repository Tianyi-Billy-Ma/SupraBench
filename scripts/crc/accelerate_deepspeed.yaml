# Accelerate launch config for 4 A40 LoRA continued pretraining via DeepSpeed.
#
# zero3_init_flag must be true: it tells the DeepSpeedPlugin to register the
# global HfDeepSpeedConfig so that transformers.from_pretrained wraps model
# construction in deepspeed.zero.Init() and partitions parameters across ranks
# at load time. Without this the 56 GB bf16 base lands fully on each A40 and
# OOMs the 48 GB cards.
#
# The plugin only activates when an Accelerator (or PartialState) is
# instantiated. cpt_lora.py creates one at the top of main() so the context
# is alive before AutoModelForImageTextToText.from_pretrained is called.
#
# Conflicting accelerate keys (mixed_precision, gradient_*, zero_stage,
# offload_*) are intentionally absent — DeepSpeed owns them via the JSON.
compute_environment: LOCAL_MACHINE
distributed_type: DEEPSPEED
deepspeed_config:
  deepspeed_config_file: scripts/crc/ds_config_zero3.json
  zero3_init_flag: true
machine_rank: 0
main_training_function: main
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
