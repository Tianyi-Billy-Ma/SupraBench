# Accelerate launch config for 4x A40 LoRA continued pretraining via DeepSpeed.
#
# When `deepspeed_config_file` is set, accelerate forbids duplicating any
# config key that DeepSpeed itself owns (mixed_precision, zero_stage,
# gradient_clipping, gradient_accumulation_steps, all zero3_* knobs,
# offload_* knobs). All of those live in scripts/crc/ds_config_zero3.json.
#
# zero3_init_flag is intentionally false: we load the full base model on each
# rank (CPU RAM is plentiful on a CRC GPU node), then DeepSpeed shards
# parameters at training start. This keeps PEFT's module-name-based LoRA
# targeting straightforward — get_peft_model walks named_modules() before
# the model is sharded.
compute_environment: LOCAL_MACHINE
distributed_type: DEEPSPEED
deepspeed_config:
  deepspeed_config_file: scripts/crc/ds_config_zero3.json
  zero3_init_flag: false
machine_rank: 0
main_training_function: main
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
