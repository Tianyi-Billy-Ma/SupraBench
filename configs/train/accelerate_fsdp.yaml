# Accelerate launch config for 4x A40 LoRA continued pretraining via FSDP.
#
# We wrap each transformer block as its own FSDP unit so activation memory
# peaks at one block at a time (instead of spanning multiple blocks like
# SIZE_BASED_WRAP would). Both classes are listed because Qwen3.5 has two
# distinct transformer-block types — one in the language model and one in
# the vision tower. The vision tower is frozen during text-only CPT, but
# wrapping its blocks too keeps shape semantics consistent and lets FSDP
# free their activations after the (no-op) backward pass.
#
# fsdp_cpu_ram_efficient_loading=true means only rank 0 holds the full
# 56 GB bf16 base in CPU RAM during from_pretrained; shards are broadcast
# to other ranks (assumes nodes with >= ~256 GB RAM).
compute_environment: LOCAL_MACHINE
distributed_type: FSDP
downcast_bf16: 'no'
fsdp_config:
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: Qwen3_5DecoderLayer,Qwen3_5VisionBlock
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_cpu_ram_efficient_loading: true
  fsdp_forward_prefetch: false
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sync_module_states: true
  fsdp_use_orig_params: true
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
