name: qwen3.5-27b-eupmc-lora

backend: hf_peft
model_id: Qwen/Qwen3.5-27B

# LoRA adapter produced by HF Trainer + Accelerate FSDP.
# PeftModel.from_pretrained resolves adapter_model.safetensors +
# adapter_config.json automatically from the checkpoint directory.
adapter_path: /groups/yye7/BILLY/SupraBench/outputs/cpt_qwen35_eupmc/checkpoint-1302

dtype: bfloat16
device_map: auto

# false → keep adapter weights separate (lower RAM, slight inference overhead).
# true  → merge_and_unload() for faster inference at the cost of higher RAM.
merge_adapter: false

# Strip <think>...</think> blocks from completions (LoRA was trained without
# thinking mode, but the base model may still emit reasoning tokens).
strip_thinking: true

generation:
  max_new_tokens: 1024
  do_sample: false
