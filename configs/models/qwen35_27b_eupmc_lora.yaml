name: qwen3.5-27b-eupmc-lora

backend: hf_peft
model_id: Qwen/Qwen3.5-27B

# LoRA adapter produced by HF Trainer + Accelerate FSDP.
# Training used SHARDED_STATE_DICT, so the raw checkpoint-NNNN/ dirs are
# DCP shards rather than the standard PEFT format. tools/
# fsdp_to_peft_adapter.py extracts them into adapter_config.json +
# adapter_model.safetensors at the path below; PeftModel.from_pretrained
# then resolves both automatically.
adapter_path: outputs/cpt_qwen35_eupmc/adapter

dtype: bfloat16
device_map: auto

# false → keep adapter weights separate (lower RAM, slight inference overhead).
# true  → merge_and_unload() for faster inference at the cost of higher RAM.
merge_adapter: false

# Strip <think>...</think> blocks from completions (LoRA was trained without
# thinking mode, but the base model may still emit reasoning tokens).
strip_thinking: true

batch_size: 8        # generate_many batches this many prompts per forward
max_input_length: 3584   # truncate prompt to leave room for max_new_tokens

generation:
  max_new_tokens: 512   # most answers fit comfortably; smaller = faster
  do_sample: false
